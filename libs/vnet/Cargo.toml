[package]
name = "motlie-vnet"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Embeddable user-mode networking for virtual machines (vhost-user-net + libslirp)"

[dependencies]
libslirp = "4"
libslirp-sys = "4"
libc = "0.2"
anyhow.workspace = true
log = "0.4"
thiserror.workspace = true
vhost = { version = "0.16", features = ["vhost-user-backend"] }
vhost-user-backend = "0.22"
virtio-queue = "0.17"
virtio-bindings = "0.2"
vm-memory = { version = "0.17", features = ["backend-mmap"] }
vmm-sys-util = "0.15"

[dev-dependencies]
env_logger.workspace = true
