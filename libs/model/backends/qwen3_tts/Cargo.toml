[package]
name = "motlie-model-qwen3-tts"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Qwen3-TTS ONNX backend for motlie-model speech contracts"

[lib]
path = "src/lib.rs"

[features]
default = []
cuda = ["motlie-model-ort/cuda", "ort/cuda"]

[dependencies]
async-trait = "0.1.89"
motlie-model = { path = "../..", features = ["metrics-runtime"] }
motlie-model-ort = { path = "../ort" }
ndarray = "0.17"
# TODO(@cld-review-models): upgrade `ort` to stable 2.x once it is released.
ort = { version = "2.0.0-rc.12", default-features = false, features = ["std", "ndarray"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
