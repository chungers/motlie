[package]
name = "motlie-model-ort"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared ONNX Runtime helpers for Motlie model backends"

[lib]
path = "src/lib.rs"

[features]
default = []
cuda = ["ort/cuda"]

[dependencies]
motlie-model = { path = "../..", features = ["metrics-runtime"] }
# TODO(@codex-tts): upgrade `ort` to stable 2.x once it is released.
ort.workspace = true
