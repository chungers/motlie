[package]
name = "motlie-models"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Curated model bundle catalog for the Motlie ecosystem"

[lib]
path = "src/lib.rs"

[features]
default = ["model-google-gemma-300m", "model-qwen3-4b"]
model-google-gemma-300m = []
model-qwen3-4b = []

[dependencies]
# anyhow is here only for the [[bin]] target — the library surface uses typed thiserror errors.
anyhow.workspace = true
async-trait = "0.1.89"
hf-hub = "0.5.0"
motlie-model = { path = "../model" }
motlie-model-mistral = { path = "../model/backends/mistral" }
thiserror.workspace = true

[dev-dependencies]
tokio.workspace = true

[[bin]]
name = "motlie-models-download"
path = "src/bin/download_artifacts.rs"

[[example]]
name = "models_v0_1"
path = "examples/v0.1/main.rs"
required-features = ["model-google-gemma-300m"]

[[example]]
name = "models_v0_2"
path = "examples/v0.2/main.rs"
required-features = ["model-qwen3-4b"]
