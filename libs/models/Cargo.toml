[package]
name = "motlie-models"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Curated model bundle catalog for the Motlie ecosystem"

[lib]
path = "src/lib.rs"

[features]
default = ["model-google-gemma-300m", "model-qwen3-embedding-06b", "model-qwen3-4b", "model-gemma4-e2b"]
model-google-gemma-300m = []
model-qwen3-embedding-06b = []
model-qwen3-4b = []
model-gemma4-e2b = []

[dependencies]
async-trait = "0.1.89"
hf-hub = "0.5.0"
motlie-model = { path = "../model" }
motlie-model-mistral = { path = "../model/backends/mistral" }
thiserror.workspace = true

[dev-dependencies]
anyhow.workspace = true
sysinfo = "0.36.1"
tokio.workspace = true

[[bin]]
name = "motlie-models-download"
path = "src/bin/download_artifacts.rs"

[[example]]
name = "models_v0_1"
path = "examples/v0.1/main.rs"

[[example]]
name = "models_v0_2"
path = "examples/v0.2/main.rs"
required-features = ["model-qwen3-4b"]

[[example]]
name = "models_v0_3"
path = "examples/v0.3/main.rs"
required-features = ["model-gemma4-e2b"]
