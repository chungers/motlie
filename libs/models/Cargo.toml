[package]
name = "motlie-models"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Curated model bundle catalog for the Motlie ecosystem"

autoexamples = false

[lib]
path = "src/lib.rs"

[features]
default = ["model-google-gemma-300m", "model-qwen3-embedding-06b", "model-qwen3-4b", "model-gemma4-e2b"]
model-google-gemma-300m = []
model-qwen3-embedding-06b = []
model-qwen3-4b = []
model-gemma4-e2b = []
model-qwen3-4b-gguf = ["dep:motlie-model-llama-cpp"]
model-gemma4-e2b-gguf = ["dep:motlie-model-llama-cpp"]
llama-cpp-cuda = ["motlie-model-llama-cpp/cuda"]
cuda = ["motlie-model-mistral/cuda"]
cudnn = ["motlie-model-mistral/cudnn"]
flash-attn = ["motlie-model-mistral/flash-attn"]
metal = ["motlie-model-mistral/metal"]
accelerate = ["motlie-model-mistral/accelerate"]

[dependencies]
async-trait = "0.1.89"
hf-hub = "0.5.0"
motlie-model = { path = "../model" }
motlie-model-mistral = { path = "../model/backends/mistral" }
motlie-model-llama-cpp = { path = "../model/backends/llama_cpp", optional = true }
thiserror.workspace = true

[dev-dependencies]
anyhow.workspace = true
sysinfo = "0.36.1"
tokio.workspace = true

[[bin]]
name = "motlie-models-download"
path = "src/bin/download_artifacts.rs"

[[example]]
name = "models_v0_1"
path = "examples/v0.1/main.rs"
required-features = ["model-google-gemma-300m", "model-qwen3-embedding-06b"]

[[example]]
name = "models_v0_2"
path = "examples/v0.2/main.rs"
required-features = ["model-qwen3-4b"]

[[example]]
name = "models_v0_3"
path = "examples/v0.3/main.rs"
required-features = ["model-gemma4-e2b"]

[[example]]
name = "models_v0_4"
path = "examples/v0.4/main.rs"
required-features = ["model-qwen3-4b-gguf"]

[[example]]
name = "bench_chat"
path = "examples/bench_chat.rs"
