schema_version = 1
kind = "motlie.workspace-release"
state = "planned"

[identity]
release_name = "2026-06-bright-beacon"
release_month = "2026-06"
codename = "bright-beacon"

[coordination]
source_repo = "chungers/motlie"
base_branch = "main"
release_branch = "release/2026-06-bright-beacon"
sub_prs_allowed = true
main_merge_policy = "never-merge-release-branch"
main_fix_policy = "cherry-pick-source-fixes-only"
product_scope = "brownfield"

[tracking]
master_issue = ""
master_issue_state = "not-created"
master_issue_policy = "close-after-github-release-live-and-final-ledger-pushed"
sub_issue_policy = "one-or-more-issues-per-platform-channel-or-binary-gate"
label = "release:2026-06-bright-beacon"
sub_issues = []

[release]
tag = "2026-06-bright-beacon"
notes_path = "releases/notes.md"
github_release = "https://github.com/chungers/motlie/releases/tag/2026-06-bright-beacon"
source_ref_policy = "final-artifacts-must-build-from-final-tag"

[discovery]
binary_manifest_glob = "releases/*.toml"
exclude = ["releases/manifest.toml"]
required_kind = "motlie.binary-release"
filename_policy = "releases/<identity.binary>.toml"

[defaults]
linux_default_libc = "musl"
linux_static_policy = "default-static-musl-when-feasible"
enabled_channels = ["archive", "installer"]
deferred_channels = ["npm", "homebrew"]
darwin_policy = "apple-silicon-only"

[[binary_completion]]
binary = "mmux"
version = "0.1.1"
manifest = "releases/mmux.toml"
notes_path = "releases/mmux.md"
state = "planned"
final_artifacts_complete = false
published = false
github_release_assets = []
channels_complete = []
channels_deferred = ["npm", "homebrew"]
deferred_channels_followup = "npm and Homebrew are out of scope for 2026-06-bright-beacon per release owner direction; do not include these channels in release-note install guidance."

[[binary_completion]]
binary = "mstream"
version = "0.1.0"
manifest = "releases/mstream.toml"
notes_path = "releases/mstream.md"
state = "planned"
final_artifacts_complete = false
published = false
github_release_assets = []
channels_complete = []
channels_deferred = ["npm", "homebrew"]
deferred_channels_followup = "npm and Homebrew are out of scope for 2026-06-bright-beacon per release owner direction; do not include these channels in release-note install guidance."

[[gate]]
id = "release-branch-created"
state = "staged"
completed_at = "2026-06-27T03:31:36Z"
completed_by = "@codex-release-eng"
source_commit = "aaecf9179fcf32e73d8f60a2c69fa12d8de6cfdc"
deferred_reason = ""
evidence = [
  { kind = "branch", ref = "release/2026-06-bright-beacon", note = "local release branch created from origin/main at aaecf9179fcf32e73d8f60a2c69fa12d8de6cfdc; remote push is pending explicit release-owner approval" },
]

[[gate]]
