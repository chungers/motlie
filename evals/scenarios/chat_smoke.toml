schema_version = 1
id = "chat_smoke"
capability = "chat"
summary = "Single-turn and follow-up chat smoke for curated text/chat bundles."

[bundle_filter]
capability = "chat"
backend = ["MistralRs", "LlamaCpp"]

[input]
system_prompt = "Be concise. Answer in one paragraph."
prompt = "In one sentence, explain what Motlie model bundles are for."
followup_prompt = "Now say that more simply."
# High cap preserves thinking-model smoke coverage while bounding no-EOS samples.
# Current curated thinking traces answer within ~2k generated tokens; cap-induced
# truncation still fails the min-response assertions instead of blocking the matrix.
max_tokens = 2048
temperature = 0.2

[assertions]
min_response_chars = 16
min_followup_response_chars = 8

[metrics]
capture_startup_ms = true
capture_request_latency = true
capture_peak_rss = true

[profiles.local-cpu-x86_64.gates]
max_process_swap_delta_bytes = 4294967296

[profiles.local-cpu-aarch64.gates]
max_process_swap_delta_bytes = 4294967296

[profiles.apple-metal]

[profiles.dgx-spark.gates]
max_process_swap_delta_bytes = 4294967296

[profiles.cuda-workstation.gates]
max_process_swap_delta_bytes = 4294967296
