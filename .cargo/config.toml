[target.'cfg(all(target_arch = "aarch64", target_os = "linux"))']
rustflags = ["-C", "target-feature=+fp16,+fhm"]

[env]
# llama-cpp-sys bindgen on slim Linux images may not see clang's compiler-resource
# C headers. Keep the repo-local compatibility shims plus common GCC builtin
# include directories visible for direct GGUF Cargo builds and eval child builds.
BINDGEN_EXTRA_CLANG_ARGS = { value = "-Itools/clang-compat/include -I/usr/lib/gcc/aarch64-linux-gnu/14/include -I/usr/lib/gcc/aarch64-linux-gnu/13/include -I/usr/lib/gcc/aarch64-linux-gnu/12/include -I/usr/lib/gcc/x86_64-linux-gnu/14/include -I/usr/lib/gcc/x86_64-linux-gnu/13/include -I/usr/lib/gcc/x86_64-linux-gnu/12/include", relative = true }
