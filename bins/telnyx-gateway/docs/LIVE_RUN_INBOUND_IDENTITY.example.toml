- Caller dialed the configured Telnyx number; operator answered the waiting inbound call manually.
- Identity processor was enabled before the call through config: `conversation.enabled=true`, `processor="identity"`.
- Streaming TTS, clause-gated early response, disabled barge-in, model warming, and quality logging were enabled.
- Caller was instructed to read the identity/repeat script once, then wait silently for playback before giving qualitative feedback.

## Caller Script

```text
This is a Motlie inbound identity smoke test.
I will read one continuous passage, then pause so the gateway can repeat what it heard.
The quick brown fox walked past the live gateway while I was still speaking, and I want the system to repeat this as soon as it can without waiting for a long silence.
Now I am going to stop for a natural endpoint.
```

