### Assessment

The #587 dispatch guard passed this live Identity/repeat sample. Assistant echo appeared after the first playback started, including the final `A gateway will begin repeating this`, but those transcripts were suppressed before processor dispatch. Identity saw only the initial caller turn and the replacement caller turn. The original playback canceled on barge-in, the replacement playback completed, and outbound pacing had 0 underruns.

Residual follow-up is #586: use the collected echo-characterization spans plus additional barge-in samples to decide AEC insertion vs an echo-aware onset gate. This run does not require additional #587 code changes.
