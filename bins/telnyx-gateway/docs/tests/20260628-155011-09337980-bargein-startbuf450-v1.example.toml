## Hypothesis

Validate the documented barge-in Identity profile with the shared 450 ms TTS start buffer. Expected behavior: caller interruption cancels active assistant playback, replacement speech is preserved and dispatched once after the post-barge-in silence window, and outbound pacing remains stable with no underruns.

## Caller Script

```text
This is a Motlie barge-in timing test. I will start with a long sentence so the gateway begins repeating it while I am still on the call. The first sentence should be interrupted before it finishes playing back. Stop now. Please repeat this replacement sentence clearly after the interruption. The replacement sentence contains marker silver, marker orange, and the words hang up near the end.
```

## Run Results

### 2026-06-28 15:58 PDT, @codex-541 -- barge-in Identity 450 ms TTS buffer probe

Status: failed quality sample. Caller qualitative feedback: bad; words were out of sequence and phrases were missing.

Quantitative summary:

- Calls answered: 1 inbound manual-answer call.
- ASR backend: kroko-2025 / sherpa-zipformer-en-kroko-2025-08-06.
- Media: PCMU 8 kHz mono.
- Config delta from current no-barge-in 450 ms baseline: barge-in enabled with `barge_in_coalesce_after_silence`; no turn batching.
- TTS pacing knob under validation: `streaming_start_buffer_ms = 450`.
- Caller turns / raw ASR finals: 6.
- Identity playback: 6 attempted playbacks, 4 canceled, 2 completed, 0 failed.
- Dropped quality events: 0.
- Excluded turns without playback: 0 in final call-terminal summary.
- Inbound transport: 3948 packets, 0 lost, 0 reordered, jitter p50 2 ms, p95 20 ms, max 321 ms.
- Outbound pacing: 584 frames, 77 underruns, inter-frame gap p50 20 ms, p95 20 ms, max 1119 ms, queue depth p50 63, p95 181.
- `tts.request_to_first_audio`: n=4, min 778 ms, max 1402 ms.
- `conversation.visible_turn_to_first_audio`: n=4, min 778 ms, max 1402 ms.
- `barge_in.cancel_terminal_to_replacement_first_audio`: n=3, min 1980 ms, max 6998 ms.
- Strict full-script WER: 30.30% over 66 reference words (S=4, D=2, I=14).

Agent-visible turn sequence inferred from final ASR / text-call dispatch order:

1. `This is a marked lead barge in timing test. I will start with a long sentence, so the gateway begins repeating it while I'm still on the call. The first sentence should be interrupted before it finishes playing back`
2. `stop now. Please repeat this replacement sentence clearly after the interruption.`
3. `but now`
4. `the replacement sentence contains marker, silver, marker, orange, and words hang out near the`
5. `up now`
6. `He's been paint this replacement sentence clearly after the interrup`

Assembled transcript:

```text
This is a marked lead barge in timing test. I will start with a long sentence, so the gateway begins repeating it while I'm still on the call. The first sentence should be interrupted before it finishes playing back stop now. Please repeat this replacement sentence clearly after the interruption. but now the replacement sentence contains marker, silver, marker, orange, and words hang out near the up now He's been paint this replacement sentence clearly after the interrup
```

Analysis:

- This run invalidates the assumption that the 450 ms TTS buffer alone is sufficient for barge-in quality. It improved no-barge-in pacing in the previous run, but barge-in cancel/replacement churn still produced 77 outbound underruns and a 1119 ms max inter-frame gap.
- The main user-visible failure was not a single ASR substitution. The processor saw six turns: the intended opening sentence, the intended stop/replacement sentence, then four continuation/echo-like fragments. Identity repeated those fragments, creating out-of-order playback.
- Echo suppression worked for two `Replacement sentence contain` candidates, but it did not suppress the later garbled fragments `up now` and `He's been paint ...`; those passed through as caller turns and were repeated.
- The post-barge-in coalescing policy did not produce one clean consolidated replacement turn. It accepted short or partial finals (`but now`, `up now`) as standalone turns after the silence window, then later accepted a garbled echo fragment.
- Transport into the gateway was clean enough for this conclusion: 0 packet loss and 0 reordered frames. The quality problem is in ASR/echo/turn arbitration and outbound pacing under cancel churn, not carrier loss.

Next engineering direction:

- Do not tune this with only larger TTS buffers. The failure is turn hygiene under active/recent assistant playback.
- Add a general post-barge-in dispatch guard: during active playback and a short post-playback echo window, short or low-content finals should be suppressed or held unless they have strong non-echo evidence.
- Make `barge_in_coalesce_after_silence` treat replacement speech as a sliding speech/ASR window and require a stable non-echo replacement candidate before dispatch, rather than dispatching every accepted final independently.
- Preserve the no-barge-in 450 ms TTS baseline, but do not promote 450 ms as barge-in-validated.

