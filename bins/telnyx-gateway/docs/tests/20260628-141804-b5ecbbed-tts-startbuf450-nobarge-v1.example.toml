## Hypothesis

Change exactly one TTS pacing knob from the current no-barge-in Identity baseline:

```toml
[voice_quality.tts]
streaming_start_buffer_ms = 450 # baseline was 300
```

Expected effect: reduce outbound underruns and max inter-frame gap without making first-audio latency unacceptable.

