Assembled transcript:

```text
This is a Montally no barch and TTS pacing probe. I will read one steady passage, then stay quiet while the gateway repeats what it heard. Marker Green starts a measure sentence. The quiet gateway should preserve this whole sentence clearly, including the words hang up near the end. I will now Now stop speaking, and wait for the repeat playback. Marker green ends the measure sentence hanging up
```

Analysis:

- This was a pure config-knob run on the same pushed code. The only intended runtime change was `voice_quality.tts.streaming_start_buffer_ms = 450`.
- The TTS pacing hypothesis passed for this sample: previous run had 58 underruns and a 1180 ms max inter-frame gap; this run had 0 underruns and a 73 ms max gap.
- The cost was a modest first-audio increase compared with the prior run: `tts.request_to_first_audio` p50/max moved from 1612 ms to 1690 ms. That tradeoff is acceptable for the current no-barge-in repeat-reliability baseline.
- ASR/endpoint segmentation still split the intended passage into two finals. The first final ended at `I will now`; the second restarted `Now stop speaking...`. This is separate from the TTS pacing fix.
- The word `hanging up` entered the transcript after the scripted end marker, so future WER/control runs should avoid spoken coordination until after Identity is detached or the call is ended.

Next-run tuning / fixes:

- Promote `streaming_start_buffer_ms = 450` as the current no-barge-in Identity pacing baseline.
- Do not also change `prebuffer_chunks` unless underruns return; the 450 ms start buffer already removed underruns in this run.
- Next no-barge-in test should isolate endpoint segmentation, changing exactly one endpointing knob: candidate `final_settle_ms = 650` or `merge_window_ms = 180`, not both.

