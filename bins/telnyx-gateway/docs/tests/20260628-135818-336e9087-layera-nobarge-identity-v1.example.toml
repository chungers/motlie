## Run Results

### 2026-06-28 14:04 PDT, @codex-541 -- inbound no-barge-in Identity Layer A baseline

Status: completed. Caller hung up normally after repeat playback.

Quantitative summary:

- Calls answered: 1 inbound manual-answer call.
- ASR backend: kroko-2025 / sherpa-zipformer-en-kroko-2025-08-06.
- Media: PCMU 8 kHz mono.
- Caller turns: 2 committed finals.
- Raw ASR final events: 2.
- Identity playback: 3 attempted turns/playbacks, 2 completed, 1 canceled by caller hangup, 0 failed.
- Dropped quality events: 0.
- Excluded turns without playback: 0 in final call-terminal summary.
- Inbound transport: 4868 packets, 0 lost, 0 reordered, jitter p50 2 ms, p95 13 ms, max 252 ms.
- Outbound pacing: 1211 frames, 58 underruns, inter-frame gap p50 20 ms, p95 23 ms, max 1180 ms, queue depth p50 148, p95 255.
- `conversation.visible_turn_to_first_audio`: n=2, min 884 ms, p50/max 1612 ms.
- `tts.request_to_first_audio`: n=2, min 884 ms, p50/max 1612 ms.
- `turn.finalize_to_first_audio`: n=2, min 1765 ms, p50/max 8902 ms.
- `conversation.final_debounce`: n=2, min 152 ms, max 8018 ms.
- Strict script WER: 20.59% over 68 reference words (S=7, D=2, I=5).
- Measured core sentence was recognized exactly, including `hang up`: `The quiet gateway should preserve this whole sentence clearly, including the words hang up near the end.`

Assembled transcript:

```text
This is a Motley layer, a no bargin identity smote test. I will read one steady passage, then stay quiet while the gateway repeats what it heard. Marker Blue starts to measure a sentence. The quiet gateway should preserve this whole sentence clearly, including the words hang up near the end. I will now not I will now stop speaking and wait for the repeat playback. Marker blue and stemmeasure sentence
```

Analysis:

- No-barge-in policy behaved as configured: barge-in was off and no barge-in cancellation was expected.
- The main recognition quality issue was not the core measured sentence; it was domain/marker wording and endpoint segmentation: `Motlie -> Motley`, `barge-in -> bargin`, `smoke -> smote`, `starts the measured sentence -> starts to measure a sentence`, and `ends the measured sentence -> and stemmeasure sentence`.
- The first ASR final ended at `hang up`; the second final restarted with `near the end` and inserted `I will now not` before the intended `I will now stop`. This created two processor-visible turns and two repeat playbacks for what the script intended as one passage.
- Playback delivery mostly worked but still shows a pacing problem: final summary recorded 2 completed playbacks and 1 hangup-canceled playback, and outbound pacing reported 58 underruns with one 1180 ms max gap. Treat this as a TTS/media pacing follow-up, not an ASR-only issue.
- The Layer A score-gating knobs were present in the config snapshot, but cancellation was disabled for this run. This run primarily validates that the no-barge-in baseline still starts and records correctly after Layer A landed.

Next-run tuning / fixes:

- Keep this no-barge-in bounded FIFO profile as the best repeat-reliability baseline for inbound Identity.
- For the next no-barge-in run, isolate endpoint segmentation by reading the same script as either one shorter measured sentence or by increasing final/merge patience in one controlled change: candidate `final_settle_ms = 650` or `merge_window_ms = 180`, not both.
- Investigate outbound pacing underruns separately. The next config-only probe can raise `streaming_start_buffer_ms` from 300 to 450 or prebuffer the first two chunks, but that trades first-audio latency for smoother playback.
- Keep domain biasing deferred; the `Motlie`/`barge-in` errors should be tracked as ASR model/runtime quality, not patched with smoke-test-specific keywords.

