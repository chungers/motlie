Qualitative caller feedback captured from transcript:

- "It's generally much, much better than the last run."
- "There's not a lot of the repeated fragments now."
- "What you repeated is much more in line with what I was reading."
- "Overall it's much better."
- "There are still a couple of endpointing awkwardness here and there."
- Caller also asked whether barge-in was enabled; for this run it was off in both `[conversation]` and `[voice_quality.barge_in]`.

Behavioral observations:

- The clause/coalescing profile noticeably reduced repeated-fragment churn relative to the prior aggressive run.
- Early-response pipeline started, but no provisional early-response quality events were emitted. This run's improvement appears to come from final coalescing, final settle, and disabled barge-in rather than from provisional early TTS.
- Identity-repeat still queued assistant playback for qualitative feedback turns. This is expected for the identity processor, but it makes WER and subjective feedback harder to isolate.
- No transport loss was observed. Audio transport looked healthy; the main remaining issues are turn segmentation, endpoint timing, and TTS latency.
- Final debounce produced long-tail waits while playback was active. This protects against overlap, but it can make later replies feel delayed.

Bugs or gaps identified:

- `first_chunk_max_chars=32` was requested initially but clamped to 40 because runtime allows `0` or `40..500`; the front matter was updated to 40 to match runtime.
- Early-response rejection/decision visibility is too thin: the log only showed pipeline start, not why provisional responses did not fire.
- For WER-only passes, identity-repeat should be detached or muted after the WER passage starts; otherwise assistant echo/repeats contaminate caller feedback.
- The protocol should explicitly send the reading script before dialing; this run started with caller confusion because the script was sent late.

Recommended next config:

- Keep: `boundary = "clause"`, `debounce_ms = 180`, `max_updates_per_utterance = 1`, barge-in off, final coalescing on.
- Add a WER-only phase with conversation detached or `audio_mode = "prepare_only"` to measure ASR without identity-repeat feedback.
- For conversational identity-repeat phase, consider `allowed_start_speech_states = ["endpoint_candidate"]` if we want fewer overlaps, or keep `while_speaking` only after provisional decision logging is added.
- Consider reducing `conversation_incomplete_tail_hold_ms` from 1800 to 1200 only after confirming it does not reintroduce fragment repeats.
- Add explicit early-response decision events for rejected partials, including boundary/confidence/stability/start-timing reasons.
