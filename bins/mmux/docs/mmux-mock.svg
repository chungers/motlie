    <text x="220" y="72" fill="#facc15" font-family="monospace" font-size="12">mode: monitor | rendered screen mirror</text>
    <text x="220" y="104" fill="#cbd5e1" font-family="monospace" font-size="12">top - 18:58:21 up 12 days</text>
    <text x="220" y="128" fill="#cbd5e1" font-family="monospace" font-size="12">PID USER      CPU  MEM COMMAND</text>
    <text x="220" y="152" fill="#94a3b8" font-family="monospace" font-size="12">2481 deploy   9.2  1.4 worker</text>
    <text x="220" y="182" fill="#93c5fd" font-family="monospace" font-size="12">ScreenStable + VTE parse</text>
    <rect x="0" y="298" width="584" height="38" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
    <text x="12" y="322" fill="#e2e8f0" font-family="monospace" font-size="12">←/→ pane | (h)elp | screen mirror | (q)uit</text>
